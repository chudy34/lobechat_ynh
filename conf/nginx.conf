# ──────────────────────────────────────────────
# LobeHub v2 — NGINX reverse proxy config
# ──────────────────────────────────────────────

# Main app (LobeHub)
#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {
    proxy_pass http://127.0.0.1:__PORT__/;
    proxy_http_version 1.1;

    # WebSocket support — required for streaming AI responses and live updates
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long timeouts for AI model streaming (some responses can take 5+ minutes)
    proxy_read_timeout 600s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;

    # Disable buffering — required for Server-Sent Events (SSE) streaming
    proxy_buffering off;
    proxy_cache off;

    # Large uploads for knowledge base (PDF, Word, etc.)
    client_max_body_size 200M;

    include conf.d/yunohost_panel.conf.inc;
}

# RustFS S3 API — presigned URLs for file access
location /s3/ {
    proxy_pass http://127.0.0.1:__PORT_RUSTFS_API__/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering off;

    # Large file uploads
    client_max_body_size 500M;
    proxy_read_timeout 300s;
}

# RustFS Console — admin panel for storage management
location /rustfs-console/ {
    proxy_pass http://127.0.0.1:__PORT_RUSTFS_CONSOLE__/;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    client_max_body_size 10M;
}
