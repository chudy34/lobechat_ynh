# LobeHub v2 — YunoHost deployment
# Source: https://github.com/lobehub/lobehub/blob/main/docker-compose/deploy/docker-compose.yml
# Requires: docker compose v2 (Docker CE)
# Tuned for: 4 vCPU / 8 GB RAM / 75 GB NVMe

services:

  # ── Shared network namespace ──────────────────────────────────────────────
  # rustfs + lobe share ports through this container's network
  network-service:
    image: alpine:latest
    container_name: __APP__-network
    restart: always
    ports:
      - "127.0.0.1:__PORT_RUSTFS_API__:9000"    # RustFS S3 API → nginx /s3/
      - "127.0.0.1:__PORT_RUSTFS_CONSOLE__:9001" # RustFS Console
      - "127.0.0.1:__PORT__:3210"                # LobeHub app
    command: tail -f /dev/null
    networks:
      - lobe-network

  # ── PostgreSQL (ParadeDB) ─────────────────────────────────────────────────
  # ParadeDB = PostgreSQL 17 + pgvector + pg_search
  # Required for Knowledge Base (RAG) and full-text search
  postgresql:
    image: paradedb/paradedb:latest-pg17
    container_name: __APP__-postgres
    restart: always
    # Internal only — no host port binding (avoids conflict with host postgresql)
    volumes:
      - __DATA_DIR__/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${LOBE_DB_NAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER:     postgres
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout:  5s
      retries:  10
      start_period: 20s
    # 4 vCPU / 8 GB RAM tuning
    shm_size: "256m"
    networks:
      - lobe-network

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: __APP__-redis
    restart: always
    command: >
      redis-server
      --save 60 1000
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - __DATA_DIR__/redis:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  5
      start_period: 10s
    networks:
      - lobe-network

  # ── RustFS ───────────────────────────────────────────────────────────────
  # S3-compatible object storage — replaces MinIO in LobeHub v2
  # Shares port 9000/9001 through network-service
  rustfs:
    image: rustfs/rustfs:latest
    container_name: __APP__-rustfs
    network_mode: "service:network-service"
    restart: always
    environment:
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY:     ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY:     ${RUSTFS_SECRET_KEY}
    volumes:
      - __DATA_DIR__/rustfs:/data
    healthcheck:
      test:     ["CMD-SHELL", "wget -qO- http://localhost:9000/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout:  3s
      retries:  30
      start_period: 15s
    command:
      - "--access-key"
      - "${RUSTFS_ACCESS_KEY}"
      - "--secret-key"
      - "${RUSTFS_SECRET_KEY}"
      - "/data"

  # ── RustFS Init ───────────────────────────────────────────────────────────
  # One-shot: creates the lobe bucket with public-read policy, then exits
  rustfs-init:
    image: minio/mc:latest
    container_name: __APP__-rustfs-init
    network_mode: "service:network-service"
    restart: "no"
    depends_on:
      rustfs:
        condition: service_healthy
    volumes:
      - __INSTALL_DIR__/bucket.config.json:/bucket.config.json:ro
    entrypoint: /bin/sh
    command: >
      -c '
        set -eux;
        mc alias set rustfs "http://localhost:9000" "${RUSTFS_ACCESS_KEY}" "${RUSTFS_SECRET_KEY}";
        mc mb "rustfs/lobe" --ignore-existing;
        mc anonymous set-json "/bucket.config.json" "rustfs/lobe";
        echo "RustFS bucket ready."
      '

  # ── SearXNG ───────────────────────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: __APP__-searxng
    restart: always
    volumes:
      - __DATA_DIR__/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_SETTINGS_FILE: /etc/searxng/settings.yml
    networks:
      - lobe-network

  # ── LobeHub v2 ────────────────────────────────────────────────────────────
  lobe:
    image: lobehub/lobehub:latest
    container_name: __APP__-lobe
    network_mode: "service:network-service"
    restart: always
    depends_on:
      postgresql:
        condition: service_healthy
      network-service:
        condition: service_started
      rustfs:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      # Auth
      KEY_VAULTS_SECRET: ${KEY_VAULTS_SECRET}
      AUTH_SECRET:       ${AUTH_SECRET}
      JWKS_KEY:          ${JWKS_KEY}

      # Database
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgresql:5432/${LOBE_DB_NAME}

      # S3 / RustFS — internal endpoint via shared network namespace
      S3_BUCKET:           ${RUSTFS_LOBE_BUCKET}
      S3_ENDPOINT:         http://localhost:9000
      S3_ACCESS_KEY:       ${RUSTFS_ACCESS_KEY}
      S3_ACCESS_KEY_ID:    ${RUSTFS_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY}
      S3_ENABLE_PATH_STYLE: "1"
      S3_SET_ACL:           "0"
      S3_PUBLIC_DOMAIN:     ${S3_PUBLIC_DOMAIN}

      # Redis
      REDIS_URL:    redis://redis:6379
      REDIS_PREFIX: lobehub
      REDIS_TLS:    "0"

      # Web search
      SEARXNG_URL: http://searxng:8080

      # App
      APP_URL:      ${APP_URL}
      NODE_ENV:     production

      # Vision / LLM
      LLM_VISION_IMAGE_USE_BASE64: "1"
    env_file:
      - .env

networks:
  lobe-network:
    driver: bridge
